name: Auto merge Exercism PRs

on:
  pull_request_target:
    types:
      - opened
      - synchronize

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge:
    runs-on: ubuntu-latest

    if: github.event.pull_request.user.login == 'exercism-solutions-syncer[bot]'

    steps:
      - name: Merge PR instantly
        run: gh pr merge --squash --delete-branch "$PR_URL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
