name: Auto merge Exercism PRs

on:
  pull_request:
    types:
      - opened
      - synchronize

permissions:
  pull-requests: write
  contents: write

jobs:
  automerge:
    runs-on: ubuntu-latest
    
    # Usamos contains() para garantir que pegue o bot, com ou sem a tag [bot] no nome
    if: contains(github.event.pull_request.user.login, 'exercism-solutions-syncer')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Merge PR instantly
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge "$PR_URL" --squash --delete-branch
